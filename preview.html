<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@400;500&family=Instrument+Serif:ital@0;1&family=Karla:wght@300;400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f5f5; }
    .preview-frame { width: 1440px; transform-origin: top left; transform: scale(0.667); margin-bottom: -33.3%; }
    .direction-label { font-family: system-ui; font-size: 18px; font-weight: 600; color: #333; padding: 24px 0 12px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="direction-a.jsx"></script>
  <script type="text/babel" src="direction-b.jsx"></script>
  <script type="text/babel" src="direction-c.jsx"></script>
  <script type="text/babel">
    const which = new URLSearchParams(location.search).get('d') || 'a';
    function App() {
      const C = which === 'a' ? DirectionA : which === 'b' ? DirectionB : DirectionC;
      return <div style={{width: 1440}}><C /></div>;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
